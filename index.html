<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>Dolbag Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Dolbag Game</h1>

<div id="game">
  <img id="character" src="images/human1.png">

  <div id="items">
    <img src="images/hat.png" onclick="equipItem('hat')">
    <img src="images/glasses.png" onclick="equipItem('glasses')">
    <img src="images/helmet.png" onclick="equipItem('helmet')">
  </div>
</div>

<button onclick="changeCharacter('human')">인간</button>
<button onclick="changeCharacter('space')">우주인</button>

<script src="app.js"></script>

</body>
</html>
